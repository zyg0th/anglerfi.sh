name: Build .deb

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb
        run: ./build-deb.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: anglerfish-deb
          path: dist/*.deb

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          prerelease: ${{ contains(github.ref, '-') }}
